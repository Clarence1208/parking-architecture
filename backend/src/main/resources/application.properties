spring.application.name=backend

# DevTools - tuned for Docker where inotify events are unreliable
spring.devtools.restart.poll-interval=2s
spring.devtools.restart.quiet-period=1s

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/parking}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:parking}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:parking}

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# Hibernate s'occupe du SQL pour toi
spring.jpa.hibernate.ddl-auto=create-drop
#spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
